spring.application.name=library-management-backend
spring.main.lazy-initialization=true
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/javascript,text/css,text/html,text/javascript,text/plain
spring.web.resources.chain.enabled=true
spring.web.resources.chain.compressed=true

spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:library_management}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:0}
spring.datasource.hikari.schema=${DB_SCHEMA:public}

spring.jpa.hibernate.ddl-auto=update
spring.data.jpa.repositories.bootstrap-mode=lazy
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jackson.time-zone=UTC

app.jwt.issuer=library-management-api
app.jwt.expiry-hours=24
app.jwt.secret=${JWT_SECRET:change-this-development-secret-key-before-production-use-1234567890}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4000,http://127.0.0.1:5173,http://127.0.0.1:4000}

app.bootstrap.admin.name=${ADMIN_NAME:Library Administrator}
app.bootstrap.admin.email=${ADMIN_EMAIL:admin@library.local}
app.bootstrap.admin.password=${ADMIN_PASSWORD:Admin@12345}
